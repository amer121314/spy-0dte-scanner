<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SPX 0DTE Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080c14;color:#d0d5e0;font-family:'Inter',system-ui,sans-serif;min-height:100vh;padding:12px 14px}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
.mono{font-family:'JetBrains Mono','Courier New',monospace}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.title{font-size:16px;font-weight:800;letter-spacing:-0.5px;display:flex;align-items:center;gap:6px}
.title-green{color:#00ff88}
.price-badge{font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(0,255,136,.08);color:#00ff88;font-weight:700}
.delay-badge{font-size:9px;padding:2px 7px;border-radius:4px;background:rgba(255,193,7,.07);color:#ffc107;font-weight:600}
.sub-hdr{font-size:9px;color:#333c50;margin-bottom:10px;font-family:'JetBrains Mono',monospace}
.controls{display:flex;align-items:center;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.btn-start{padding:5px 14px;border-radius:5px;font-size:10px;font-weight:700;background:rgba(0,255,136,.08);color:#00ff88;border:1px solid rgba(0,255,136,.15)}
.btn-start.stop{background:rgba(255,59,72,.08);color:#ff3b48;border-color:rgba(255,59,72,.15)}
.btn-refresh{padding:5px 12px;border-radius:5px;font-size:10px;font-weight:700;background:rgba(255,255,255,.04);color:#777;border:1px solid rgba(255,255,255,.06)}
.btn-hist{padding:5px 12px;border-radius:5px;font-size:10px;font-weight:700;background:rgba(108,92,231,.08);color:#9b90e0;border:1px solid rgba(108,92,231,.12)}
.igroup{display:flex;gap:2px}
.ibtn{padding:4px 8px;border-radius:4px;font-size:9px;font-weight:700;background:rgba(255,255,255,.03);color:#444b5a;border:1px solid transparent}
.ibtn.on{background:rgba(0,255,136,.08);color:#00ff88;border-color:rgba(0,255,136,.15)}
.cd{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.03);color:#555;min-width:32px;text-align:center}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px}
.stat-card{padding:8px 10px;border-radius:7px;background:rgba(12,16,28,.9);border:1px solid rgba(255,255,255,.03)}
.stat-lbl{font-size:7px;color:#333c50;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700}
.frow{display:flex;align-items:center;gap:5px;margin-bottom:7px;flex-wrap:wrap}
.fbtn{padding:4px 10px;border-radius:4px;font-size:9px;font-weight:700;background:rgba(255,255,255,.03);color:#444b5a;border:1px solid transparent}
.fbtn.g{background:rgba(0,255,136,.08);color:#00ff88;border-color:rgba(0,255,136,.12)}
.fbtn.y{background:rgba(255,193,7,.08);color:#ffc107;border-color:rgba(255,193,7,.12)}
.fbtn.p{background:rgba(108,92,231,.1);color:#9b90e0;border-color:rgba(108,92,231,.15)}
.shown{margin-left:auto;font-size:9px;color:#333c50}
.wl-panel{margin-bottom:10px;padding:10px 12px;border-radius:8px;background:rgba(14,18,30,.9);border:1px solid rgba(108,92,231,.15)}
.wl-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.wl-title{font-size:10px;font-weight:700;color:#9b90e0;letter-spacing:.8px}
.wl-clear{padding:2px 8px;border-radius:4px;font-size:8px;background:transparent;color:#ff3b48;border:1px solid rgba(255,59,72,.2)}
.wl-items{display:flex;flex-wrap:wrap;gap:6px}
.wl-item{display:flex;flex-direction:column;gap:3px;padding:7px 10px;border-radius:6px;background:rgba(108,92,231,.05);border:1px solid rgba(108,92,231,.12)}
.wl-row1{display:flex;align-items:center;gap:5px}
.wl-time{font-size:9px;color:#6c5ce7;font-weight:700;font-family:'JetBrains Mono',monospace}
.wl-date{font-size:8px;color:#2a3045}
.err-box{padding:10px 12px;border-radius:7px;background:rgba(255,59,72,.06);border:1px solid rgba(255,59,72,.15);color:#ff3b48;font-size:11px;margin-bottom:10px}
.center-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.fetch-btn{padding:10px 24px;border-radius:7px;font-size:12px;font-weight:700;background:rgba(0,255,136,.08);color:#00ff88;border:1px solid rgba(0,255,136,.15)}
.contract{border-radius:7px;padding:8px 10px;margin-bottom:3px;cursor:pointer;position:relative}
.contract.hot{background:linear-gradient(135deg,rgba(0,255,136,.02),rgba(8,12,20,1));border:1px solid rgba(0,255,136,.12)}
.contract.norm{background:rgba(12,16,28,.7);border:1px solid rgba(255,255,255,.02)}
.hot-badge{position:absolute;top:0;right:0;background:linear-gradient(135deg,#00ff88,#00bb60);color:#080c14;font-size:7px;font-weight:800;padding:1px 7px 1px 10px;border-radius:0 7px 0 6px;letter-spacing:1px}
.c-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.c-type{padding:1px 6px;border-radius:3px;font-size:8px;font-weight:700;text-transform:uppercase}
.c-type.call{background:rgba(0,255,136,.06);color:#00ff88}
.c-type.put{background:rgba(255,59,72,.06);color:#ff3b48}
.c-metrics{display:flex;gap:4px;flex:1;justify-content:center;flex-wrap:wrap}
.metric{display:flex;flex-direction:column;align-items:center;padding:1px 5px;border-radius:3px}
.metric.hl{background:rgba(0,255,136,.04);border:1px solid rgba(0,255,136,.08)}
.metric.nl{border:1px solid transparent}
.metric-lbl{font-size:6px;color:#333c50;font-weight:600}
.metric-val{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600}
.metric-val.hl{color:#00ff88}
.metric-val.nl{color:#777}
.watch-btn{padding:3px 8px;border-radius:4px;font-size:9px;font-weight:600;background:rgba(108,92,231,.1);color:#9b90e0;flex-shrink:0;border:none}
.watch-btn.on{color:#555;cursor:default}
.exp-sec{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.03)}
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.exp-row{display:flex;justify-content:space-between;font-size:10px}
.bar-row{display:flex;align-items:center;gap:4px;margin-bottom:2px}
.bar-track{flex:1;height:3px;border-radius:2px;background:#131828}
.bar-fill{height:100%;border-radius:2px;transition:width .3s}
.hist-view{min-height:100vh}
.hist-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.btn-back{padding:5px 12px;border-radius:5px;font-size:10px;font-weight:700;background:rgba(0,255,136,.08);color:#00ff88;border:1px solid rgba(0,255,136,.15)}
.btn-clr{padding:5px 12px;border-radius:5px;font-size:10px;font-weight:700;background:rgba(255,59,72,.06);color:#ff3b48;border:1px solid rgba(255,59,72,.12)}
.date-item{padding:8px 12px;border-radius:6px;background:rgba(12,16,28,.9);border:1px solid rgba(255,255,255,.03);cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.date-item.sel{border-color:rgba(108,92,231,.3);background:rgba(108,92,231,.05)}
.scan-item{padding:7px 10px;border-radius:5px;background:rgba(12,16,28,.7);border:1px solid rgba(255,255,255,.02);cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.scan-item.sel{border-color:rgba(0,255,136,.2);background:rgba(0,255,136,.03)}
.footer{margin-top:14px;padding-top:8px;border-top:1px solid rgba(255,255,255,.02);font-size:7px;color:#1d2233;text-align:center;line-height:1.6}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 1.5s infinite}
</style>
</head>
<body>
<div id="app"></div>
<script>
var API_KEY = '7TIsr4oKxRzk6kr4mFFNDbpdgZ1My2wu';
var TICKER = 'SPX';
var INTERVALS = [1,2,3,5];

var S = {
  view:'scanner', contracts:[], price:0, loading:false, error:'',
  lastUpdate:null, running:false, filter:'all', sortBy:'score',
  minScore:0, expanded:null, countdown:0, intervalMin:1,
  history:{}, histSelDate:null, histSelScan:null, watchlist:[],
  _timer:null
};

function loadStorage() {
  try { var h=localStorage.getItem('spx5_hist'); if(h) S.history=JSON.parse(h); } catch(e){}
  try { var w=localStorage.getItem('spx5_wl');   if(w) S.watchlist=JSON.parse(w); } catch(e){}
}
function saveHist() { try{localStorage.setItem('spx5_hist',JSON.stringify(S.history));}catch(e){} }
function saveWL()   { try{localStorage.setItem('spx5_wl',  JSON.stringify(S.watchlist));}catch(e){} }

function calcScore(c) {
  var voi=c.oi>0?c.vol/c.oi:0, voiS=Math.min(voi*5,25);
  var p=c.last||0;
  var cheap=(c.otm&&p>0&&p<1)?20:(c.otm&&p<3)?14:(c.otm&&p<6)?8:c.otm?3:0;
  var iv=(c.iv||0)*100;
  var ivS=iv>100?15:iv>70?12:iv>50?8:iv>30?4:0;
  var volS=c.vol>10000?10:c.vol>5000?8:c.vol>1000?5:c.vol>200?2:0;
  var mid=(c.ask+c.bid)/2, spr=mid>0?(c.ask-c.bid)/mid:1;
  var sprS=spr<.08?8:spr<.15?6:spr<.3?3:0;
  var absPct=Math.abs(c.pctChg||0);
  var chgS=absPct>50?12:absPct>20?8:absPct>10?4:0;
  var otmB=c.otm?10:0;
  return {
    total:Math.min(Math.round(voiS+cheap+ivS+volS+sprS+chgS+otmB),100),
    bd:{
      'Vol/OI':{v:Math.round(voiS),m:25,d:voi.toFixed(1)+'x'},
      'Cheap': {v:Math.round(cheap),m:20,d:'$'+p.toFixed(2)},
      'IV':    {v:Math.round(ivS),  m:15,d:iv.toFixed(0)+'%'},
      'Volume':{v:Math.round(volS), m:10,d:c.vol>999?(c.vol/1000).toFixed(1)+'K':''+c.vol},
      'Spread':{v:Math.round(sprS), m:8, d:(spr*100).toFixed(0)+'%'},
      'Move':  {v:Math.round(chgS), m:12,d:(c.pctChg||0).toFixed(1)+'%'},
      'OTM':   {v:Math.round(otmB), m:10,d:c.otm?'Yes':'No'}
    }
  };
}

function getToday() {
  var d=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function fetchData() {
  S.loading=true; S.error=''; render();
  var today=getToday();
  var url='https://api.polygon.io/v3/snapshot/options/'+TICKER+'?expiration_date='+today+'&limit=250&apiKey='+API_KEY;
  fetch(url)
    .then(function(r){
      if(!r.ok) return r.json().then(function(e){throw new Error(r.status===403?'API Key لا يملك صلاحية Options':r.status===429?'Rate Limit - انتظر دقيقة':'خطأ '+r.status+': '+(e.error||e.message||''));});
      return r.json();
    })
    .then(function(data){
      var results=data.results||[];
      if(!results.length) {
        return fetch('https://api.polygon.io/v3/snapshot/options/'+TICKER+'?limit=250&apiKey='+API_KEY)
          .then(function(r2){return r2.json();})
          .then(function(d2){
            results=d2.results||[];
            if(!results.length) throw new Error('لا عقود متاحة. السوق ربما مغلق.');
            processResults(results, today);
          });
      }
      processResults(results, today);
    })
    .catch(function(e){ S.error=e.message; S.loading=false; render(); });
}

function processResults(results, today) {
  var uP=0;
  // Try to get underlying price from first result
  if(results[0] && results[0].underlying_asset) uP=results[0].underlying_asset.price||0;

  var contracts=[];
  results.forEach(function(item){
    var d=item.details||{}, q=item.day||{}, g=item.greeks||{};
    var strike=d.strike_price||0;
    var type=d.contract_type==='call'?'call':'put';
    var bid=item.last_quote?(item.last_quote.bid||0):0;
    var ask=item.last_quote?(item.last_quote.ask||0):0;
    var last=item.last_trade?(item.last_trade.price||0):0;
    if(!last) last=(bid+ask)/2;
    if(!last) last=q.close||0;
    var vol=q.volume||0;
    var oi=item.open_interest||0;
    var iv=item.implied_volatility||0;
    var prevClose=q.previous_close||0;
    var pctChg=prevClose>0?((last-prevClose)/prevClose*100):0;
    if(vol===0&&oi===0) return;
    var otm=type==='call'?strike>uP:strike<uP;
    var c={
      ticker:item.ticker||('O:'+TICKER+type.toUpperCase()+strike),
      strike:strike, type:type, uPrice:uP, last:last, bid:bid, ask:ask,
      vol:vol, oi:oi, iv:iv, pctChg:pctChg, otm:otm,
      dist:Math.abs(strike-uP).toFixed(1),
      distP:uP>0?((Math.abs(strike-uP)/uP)*100).toFixed(2):'0',
      volOi:oi>0?vol/oi:0,
      delta:g.delta||0, gamma:g.gamma||0, theta:g.theta||0, vega:g.vega||0
    };
    var sc=calcScore(c); c.score=sc.total; c.bd=sc.bd;
    contracts.push(c);
  });

  // Get SPX price if not available
  if(uP===0) {
    fetch('https://api.polygon.io/v2/aggs/ticker/I:SPX/prev?adjusted=true&apiKey='+API_KEY)
      .then(function(r){return r.json();})
      .then(function(d){
        var p=d.results&&d.results[0]?d.results[0].c:0;
        if(p>0){
          S.price=p;
          contracts.forEach(function(c){
            c.uPrice=p; c.otm=c.type==='call'?c.strike>p:c.strike<p;
            var sc=calcScore(c); c.score=sc.total; c.bd=sc.bd;
          });
        }
        finalize(contracts,today);
      }).catch(function(){finalize(contracts,today);});
  } else {
    S.price=uP;
    finalize(contracts,today);
  }
}

function finalize(contracts, today) {
  S.contracts=contracts; S.loading=false; S.lastUpdate=new Date();
  // Save history
  var h=JSON.parse(JSON.stringify(S.history));
  if(!h[today]) h[today]=[];
  var top50=contracts.slice().sort(function(a,b){return b.score-a.score;}).slice(0,50).map(function(c){
    return {s:c.ticker,k:c.strike,t:c.type,l:c.last,b:c.bid,a:c.ask,v:c.vol,o:c.oi,iv:c.iv,p:c.pctChg,otm:c.otm,sc:c.score,voi:c.volOi};
  });
  var now=new Date();
  h[today].push({
    time:now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true}),
    ts:Date.now(), price:S.price,
    hot:contracts.filter(function(c){return c.score>=60;}).length,
    n:contracts.length, c:top50
  });
  if(h[today].length>60) h[today]=h[today].slice(-60);
  var keys=Object.keys(h).sort();
  while(keys.length>30){delete h[keys.shift()];}
  S.history=h; saveHist();
  // Update watchlist
  S.watchlist.forEach(function(w){
    var live=contracts.find(function(c){return c.ticker===w.ticker;});
    if(live) w.curPrice=live.last;
  });
  saveWL();
  render();
}

function startTimer() {
  stopTimer();
  var secs=S.intervalMin*60;
  S.countdown=secs; S.running=true;
  S._timer=setInterval(function(){
    S.countdown--;
    if(S.countdown<=0){S.countdown=secs;fetchData();}
    var el=document.getElementById('cd');
    if(el) el.textContent=S.countdown+'s';
  },1000);
  fetchData(); render();
}
function stopTimer() {
  if(S._timer){clearInterval(S._timer);S._timer=null;}
  S.running=false; S.countdown=0;
}

function addWatch(ticker,strike,type,score,lastPrice) {
  if(S.watchlist.find(function(w){return w.ticker===ticker;})) return;
  var now=Date.now();
  S.watchlist.push({
    id:now, ticker:ticker, strike:strike, type:type, score:score,
    entryPrice:lastPrice, curPrice:null, addedAt:now,
    addedTimeStr:new Date(now).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true}),
    addedDateStr:new Date(now).toLocaleDateString('en-US',{month:'short',day:'numeric'})
  });
  saveWL(); render();
}
function removeWatch(id) {
  S.watchlist=S.watchlist.filter(function(w){return w.id!==id;});
  saveWL(); render();
}

function ringHTML(score,size) {
  size=size||36;
  var r=(size-5)/2, ci=2*Math.PI*r, off=ci-(score/100)*ci;
  var cl=score>=65?'#00ff88':score>=45?'#ffc107':score>=25?'#ff8c00':'#555';
  return '<svg width="'+size+'" height="'+size+'" style="flex-shrink:0">'
    +'<circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="#161c2a" stroke-width="3"/>'
    +'<circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="'+cl+'" stroke-width="3"'
    +' stroke-dasharray="'+ci+'" stroke-dashoffset="'+off+'" stroke-linecap="round"'
    +' transform="rotate(-90 '+(size/2)+' '+(size/2)+')" style="transition:stroke-dashoffset .5s"/>'
    +'<text x="'+(size/2)+'" y="'+(size/2+1)+'" text-anchor="middle" dominant-baseline="middle"'
    +' fill="'+cl+'" font-size="10" font-weight="700" font-family="monospace">'+score+'</text>'
    +'</svg>';
}
function barHTML(val,max) {
  var pct=(val/max)*100, clr=val>max*0.6?'#00ff88':'#252d40';
  return '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+clr+'"></div></div>';
}

function toggleExpand(ticker) { S.expanded=S.expanded===ticker?null:ticker; render(); }

function getDisplayed(contracts) {
  var r=contracts.slice();
  if(S.filter==='calls') r=r.filter(function(c){return c.type==='call';});
  if(S.filter==='puts')  r=r.filter(function(c){return c.type==='put';});
  if(S.minScore>0) r=r.filter(function(c){return c.score>=S.minScore;});
  r.sort(function(a,b){
    if(S.sortBy==='score')  { var d=b.score-a.score; return d!==0?d:b.volOi-a.volOi; }
    if(S.sortBy==='voloi')  return b.volOi-a.volOi;
    if(S.sortBy==='volume') return b.vol-a.vol;
    if(S.sortBy==='cheap')  return a.last-b.last;
    if(S.sortBy==='iv')     return b.iv-a.iv;
    return 0;
  });
  return r;
}

function contractRow(c,rank) {
  var isHot=c.score>=60;
  var inW=S.watchlist.find(function(w){return w.ticker===c.ticker;});
  var rankClr=rank<=3?'#00ff88':'#333c50';
  var chgClr=c.pctChg>=0?'#00ff88':'#ff3b48';
  var isExp=S.expanded===c.ticker;
  var h='<div class="contract '+(isHot?'hot':'norm')+'" onclick="toggleExpand(\''+c.ticker+'\')">';
  if(isHot) h+='<div class="hot-badge">HOT</div>';
  h+='<div class="c-row">';
  h+='<span class="mono" style="width:18px;text-align:center;font-size:9px;font-weight:700;color:'+rankClr+'">'+rank+'</span>';
  h+='<span class="c-type '+c.type+'">'+c.type+'</span>';
  h+='<div style="min-width:60px">';
  h+='<div style="display:flex;align-items:baseline;gap:3px">';
  h+='<span class="mono" style="font-size:13px;font-weight:700">'+c.strike+'</span>';
  h+='<span style="font-size:7px;color:#333c50">'+(c.otm?'OTM':'ITM')+'</span>';
  h+='</div>';
  h+='<div style="display:flex;gap:4px;margin-top:1px">';
  h+='<span class="mono" style="font-size:11px;color:#ffc107;font-weight:600">$'+c.last.toFixed(2)+'</span>';
  h+='<span style="font-size:8px;color:'+chgClr+'">'+(c.pctChg>=0?'+':'')+c.pctChg.toFixed(1)+'%</span>';
  h+='</div></div>';
  h+='<div class="c-metrics">';
  [{l:'V/OI',v:c.volOi.toFixed(1)+'x',hl:c.volOi>3},
   {l:'Vol', v:c.vol>999?(c.vol/1000).toFixed(1)+'K':''+c.vol,hl:c.vol>3000},
   {l:'IV',  v:(c.iv*100).toFixed(0)+'%',hl:c.iv>0.6}
  ].forEach(function(m){
    h+='<div class="metric '+(m.hl?'hl':'nl')+'">';
    h+='<span class="metric-lbl">'+m.l+'</span>';
    h+='<span class="metric-val '+(m.hl?'hl':'nl')+'">'+m.v+'</span>';
    h+='</div>';
  });
  h+='</div>';
  h+=ringHTML(c.score,36);
  h+='<button class="watch-btn'+(inW?' on':'')+'" onclick="event.stopPropagation();'+(inW?'':'addWatch(\''+c.ticker+'\','+c.strike+',\''+c.type+'\','+c.score+','+c.last+')')+'">'+(inW?'✓':'👁')+'</button>';
  h+='</div>';
  if(isExp) {
    h+='<div class="exp-sec">';
    h+='<div class="exp-grid">';
    [['Bid','$'+c.bid.toFixed(2)],['Ask','$'+c.ask.toFixed(2)],
     ['Volume',c.vol.toLocaleString()],['OI',c.oi.toLocaleString()],
     ['IV',(c.iv*100).toFixed(1)+'%'],['V/OI',c.volOi.toFixed(2)+'x'],
     ['Dist','$'+c.dist],['Away',c.distP+'%']
    ].forEach(function(d){
      h+='<div class="exp-row"><span style="color:#555">'+d[0]+'</span><span class="mono" style="color:#aab">'+d[1]+'</span></div>';
    });
    if(c.delta!==0) {
      [['Delta',c.delta.toFixed(3)],['Gamma',c.gamma.toFixed(4)],['Theta',c.theta.toFixed(3)],['Vega',c.vega.toFixed(3)]].forEach(function(d){
        h+='<div class="exp-row"><span style="color:#555">'+d[0]+'</span><span class="mono" style="color:#aab">'+d[1]+'</span></div>';
      });
    }
    h+='</div>';
    h+='<div style="font-size:8px;color:#333c50;font-weight:700;letter-spacing:1px;margin-bottom:4px">SCORE: '+c.score+'/100</div>';
    Object.keys(c.bd).forEach(function(k){
      var s=c.bd[k];
      h+='<div class="bar-row">';
      h+='<span style="width:50px;font-size:8px;color:#555">'+k+'</span>';
      h+=barHTML(s.v,s.m);
      h+='<span class="mono" style="width:28px;text-align:right;font-size:7px;color:#555">'+s.v+'/'+s.m+'</span>';
      h+='<span class="mono" style="width:36px;text-align:right;font-size:7px;color:#444">'+s.d+'</span>';
      h+='</div>';
    });
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function renderScanner() {
  var contracts=S.contracts, displayed=getDisplayed(contracts);
  var hotCount=contracts.filter(function(c){return c.score>=60;}).length;
  var cVol=contracts.filter(function(c){return c.type==='call';}).reduce(function(s,c){return s+c.vol;},0);
  var pVol=contracts.filter(function(c){return c.type==='put';}).reduce(function(s,c){return s+c.vol;},0);
  var totalVol=cVol+pVol;
  var cpRatio=pVol>0?(cVol/pVol).toFixed(2):'—';
  var avgScore=contracts.length>0?Math.round(contracts.reduce(function(s,c){return s+c.score;},0)/contracts.length):0;
  var h='';

  h+='<div class="hdr">';
  h+='<div class="title">🔬 '+TICKER+' <span class="title-green">0DTE</span> Scanner';
  if(S.price>0) h+=' <span class="price-badge">$'+S.price.toFixed(2)+'</span>';
  h+='</div>';
  h+='<span class="delay-badge">⏱ 15min DELAY</span>';
  h+='</div>';

  h+='<div class="sub-hdr">'+TICKER+' • '+getToday()+' • '+contracts.length+' contracts'+(S.lastUpdate?' • '+S.lastUpdate.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true}):'')+'</div>';

  h+='<div class="controls">';
  h+='<button class="btn-start'+(S.running?' stop':'')+'" onclick="'+(S.running?'stopTimer();render()':'startTimer()')+'">'+(S.running?'⏹ STOP':'▶ START')+'</button>';
  h+='<button class="btn-refresh" onclick="fetchData()">↻ Refresh</button>';
  h+='<button class="btn-hist" onclick="S.view=\'history\';render()">📅 History</button>';
  h+='<div class="igroup">';
  INTERVALS.forEach(function(n){
    h+='<button class="ibtn'+(S.intervalMin===n?' on':'')+'" onclick="S.intervalMin='+n+';if(S.running){stopTimer();startTimer();}else{render()}">'+n+'m</button>';
  });
  h+='</div>';
  if(S.running) h+='<span class="cd" id="cd">'+S.countdown+'s</span>';
  h+='</div>';

  if(S.error) h+='<div class="err-box">❌ '+S.error+'</div>';

  if(contracts.length>0) {
    h+='<div class="stats-grid">';
    [{l:'🔥 HOT',v:hotCount,c:'#00ff88'},{l:'📊 AVG SCORE',v:avgScore,c:'#ffc107'},
     {l:'📈 TOTAL VOL',v:totalVol.toLocaleString(),c:'#6c5ce7'},{l:'⚖️ C/P',v:cpRatio,c:'#00b4d8'},
     {l:'📋 CONTRACTS',v:contracts.length,c:'#99a1b3'},{l:'📞 CALL VOL',v:cVol.toLocaleString(),c:'#00ff88'}
    ].forEach(function(s){
      h+='<div class="stat-card"><div class="stat-lbl">'+s.l+'</div><div class="stat-val" style="color:'+s.c+'">'+s.v+'</div></div>';
    });
    h+='</div>';
    h+='<div class="frow">';
    [['all','All'],['calls','Calls'],['puts','Puts']].forEach(function(p){
      h+='<button class="fbtn'+(S.filter===p[0]?' g':'')+'" onclick="S.filter=\''+p[0]+'\';render()">'+p[1]+'</button>';
    });
    h+='</div>';
    h+='<div class="frow">';
    [['score','Score'],['voloi','V/OI'],['volume','Volume'],['cheap','Cheapest'],['iv','IV']].forEach(function(p){
      h+='<button class="fbtn'+(S.sortBy===p[0]?' y':'')+'" onclick="S.sortBy=\''+p[0]+'\';render()">'+p[1]+'</button>';
    });
    h+='<span style="font-size:9px;color:#333c50;font-weight:700;margin-left:4px">MIN:</span>';
    [0,25,45,65].forEach(function(n){
      h+='<button class="fbtn'+(S.minScore===n?' p':'')+'" onclick="S.minScore='+n+';render()">'+(n===0?'All':n+'+')+'</button>';
    });
    h+='<span class="shown">'+displayed.length+' shown</span>';
    h+='</div>';
  }

  if(S.watchlist.length>0) {
    h+='<div class="wl-panel">';
    h+='<div class="wl-hdr"><span class="wl-title">👁 WATCHLIST ('+S.watchlist.length+')</span>';
    h+='<button class="wl-clear" onclick="S.watchlist=[];saveWL();render()">Clear All</button></div>';
    h+='<div class="wl-items">';
    S.watchlist.forEach(function(w){
      var typeClr=w.type==='call'?'#00ff88':'#ff3b48';
      var live=S.contracts.find(function(c){return c.ticker===w.ticker;});
      var curP=(live?live.last:null)||w.curPrice||w.entryPrice||0;
      var pnlPct=w.entryPrice>0?((curP-w.entryPrice)/w.entryPrice*100):0;
      var pnlClr=pnlPct>=0?'#00ff88':'#ff3b48';
      h+='<div class="wl-item">';
      h+='<div class="wl-row1">';
      h+='<span style="font-size:9px;color:'+typeClr+';font-weight:700">'+w.type.toUpperCase()+'</span>';
      h+='<span class="mono" style="font-size:11px;font-weight:700;color:#e4e8f0">'+w.strike+'</span>';
      h+='<span class="mono" style="font-size:9px;color:#ffc107">$'+curP.toFixed(2)+'</span>';
      h+='<span class="mono" style="font-size:9px;color:'+pnlClr+'">'+(pnlPct>=0?'+':'')+pnlPct.toFixed(1)+'%</span>';
      h+='<span style="font-size:8px;padding:1px 5px;border-radius:3px;background:rgba(0,255,136,.06);color:#00ff88">'+w.score+'</span>';
      h+='<button onclick="removeWatch('+w.id+')" style="font-size:9px;padding:1px 5px;border-radius:3px;border:none;background:rgba(255,59,72,.1);color:#ff3b48;cursor:pointer">✕</button>';
      h+='</div>';
      h+='<div style="display:flex;align-items:center;gap:4px">';
      h+='<span class="wl-time">⏰ '+w.addedTimeStr+'</span>';
      h+='<span class="wl-date"> • '+w.addedDateStr+'</span>';
      h+='</div>';
      h+='</div>';
    });
    h+='</div></div>';
  }

  if(S.loading&&!contracts.length) {
    h+='<div class="center-box"><div style="font-size:32px;margin-bottom:12px" class="pulse">📡</div>';
    h+='<div style="font-size:14px;color:#666d7e">Fetching live options data...</div>';
    h+='<div style="font-size:11px;color:#444b5a;margin-top:4px">'+TICKER+' • '+getToday()+'</div></div>';
  } else if(!S.loading&&!contracts.length&&!S.error) {
    h+='<div class="center-box"><button class="fetch-btn" onclick="fetchData()">📡 Fetch Live Data</button></div>';
  }

  if(displayed.length>0) {
    h+='<div>';
    displayed.forEach(function(c,i){h+=contractRow(c,i+1);});
    h+='</div>';
  }

  h+='<div class="footer">Data: Polygon.io • Score = Vol/OI(25)+Cheap(20)+IV(15)+Volume(10)+Spread(8)+Move(12)+OTM(10)<br>';
  h+='History: auto-saved every scan • Last 30 days • Last 60 scans/day<br>';
  h+='<span style="color:#ff3b48">⚠️ Not financial advice. 0DTE options carry extreme risk.</span></div>';
  return h;
}

function renderHistory() {
  var histDates=Object.keys(S.history).sort().reverse();
  var scans=S.histSelDate?(S.history[S.histSelDate]||[]).slice().reverse():[];
  var selScan=S.histSelScan!==null?scans[S.histSelScan]:null;
  var histContracts=[];
  if(selScan) {
    histContracts=selScan.c.map(function(c){
      var sc=calcScore({vol:c.v,oi:c.o,last:c.l,bid:c.b,ask:c.a,iv:c.iv,pctChg:c.p,otm:c.otm});
      return {ticker:c.s,strike:c.k,type:c.t,last:c.l,bid:c.b,ask:c.a,vol:c.v,oi:c.o,iv:c.iv,
              pctChg:c.p,otm:c.otm,score:c.sc,volOi:c.voi,uPrice:0,dist:'0',distP:'0',
              delta:0,gamma:0,theta:0,vega:0,bd:sc.bd};
    });
    histContracts=getDisplayed(histContracts);
  }
  var h='<div class="hist-view">';
  h+='<div class="hist-hdr">';
  h+='<div style="display:flex;align-items:center;gap:8px">';
  h+='<span style="font-size:15px;font-weight:700">📅 History</span>';
  if(S.histSelDate) h+='<span style="font-family:monospace;font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(108,92,231,.1);color:#9b90e0">'+S.histSelDate+'</span>';
  h+='</div>';
  h+='<div style="display:flex;gap:6px">';
  h+='<button class="btn-back" onclick="S.view=\'scanner\';S.histSelDate=null;S.histSelScan=null;render()">← Scanner</button>';
  h+='<button class="btn-clr" onclick="S.history={};S.histSelDate=null;S.histSelScan=null;saveHist();render()">🗑 Clear</button>';
  h+='</div></div>';
  if(!histDates.length) {
    h+='<div class="center-box"><div style="font-size:14px;color:#555">No history yet.<br>Start the scanner to record data.</div></div>';
    h+='</div>'; return h;
  }
  histDates.forEach(function(d){
    var cnt=(S.history[d]||[]).length;
    h+='<div class="date-item'+(S.histSelDate===d?' sel':'')+'" onclick="S.histSelDate=\''+d+'\';S.histSelScan=null;render()">';
    h+='<span class="mono" style="font-size:11px;font-weight:700">'+d+'</span>';
    h+='<span style="font-size:9px;color:#555">'+cnt+' scans</span>';
    h+='</div>';
  });
  if(S.histSelDate&&scans.length) {
    h+='<div style="font-size:9px;color:#555;font-weight:700;letter-spacing:.8px;margin:8px 0 6px">SCANS FOR '+S.histSelDate+'</div>';
    scans.forEach(function(scan,i){
      h+='<div class="scan-item'+(S.histSelScan===i?' sel':'')+'" onclick="S.histSelScan='+i+';render()">';
      h+='<span class="mono" style="font-size:10px;font-weight:700">'+scan.time+'</span>';
      h+='<span style="font-size:8px;color:#555">'+scan.n+' contracts • '+scan.hot+' HOT'+(scan.price?' • $'+scan.price.toFixed(2):'')+'</span>';
      h+='</div>';
    });
  }
  if(selScan&&histContracts.length) {
    h+='<div class="frow">';
    [['all','All'],['calls','Calls'],['puts','Puts']].forEach(function(p){
      h+='<button class="fbtn'+(S.filter===p[0]?' g':'')+'" onclick="S.filter=\''+p[0]+'\';render()">'+p[1]+'</button>';
    });
    h+='</div>';
    h+='<div class="frow">';
    [['score','Score'],['voloi','V/OI'],['volume','Volume'],['cheap','Cheapest'],['iv','IV']].forEach(function(p){
      h+='<button class="fbtn'+(S.sortBy===p[0]?' y':'')+'" onclick="S.sortBy=\''+p[0]+'\';render()">'+p[1]+'</button>';
    });
    h+='</div>';
    h+='<div>';
    histContracts.forEach(function(c,i){h+=contractRow(c,i+1);});
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function render() {
  var app=document.getElementById('app');
  if(!app) return;
  app.innerHTML=S.view==='history'?renderHistory():renderScanner();
}

loadStorage();
render();
</script>
</body>
</html>
